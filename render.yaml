services:
  - type: web
    name: the-silicon-citadel
    env: python
    region: oregon
    buildCommand: "pip install -r requirements.txt"
    startCommand: "./start.sh"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "the-silicon-citadel.onrender.com"
      - key: SECRET_KEY
        value: "django-prod-key-change-this"
